<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>指南针</title>
    <meta name="theme-color" content="#0a0a12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json">
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0a0a12;
            color: #fff;
            font-family: -apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            max-height: 860px;
            background: radial-gradient(ellipse at 50% 40%, #16162a, #0a0a12 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px 30px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }
        /* ===== 顶部栏 ===== */
        .top-bar {
            position: absolute;
            top: 18px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            pointer-events: none;
        }
        .level-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 14px 6px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .level-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
            transition: background 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.3);
        }
        .level-dot.warning { background: #facc15; box-shadow: 0 0 12px rgba(250, 204, 21, 0.3); }
        .level-dot.danger { background: #f87171; box-shadow: 0 0 12px rgba(248, 113, 113, 0.3); }
        .level-text {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.85);
            font-variant-numeric: tabular-nums;
        }
        .level-text span { font-size: 13px; color: rgba(255, 255, 255, 0.4); margin-left: 2px; }
        .status-badge {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        /* ===== 罗盘 Canvas ===== */
        .compass-wrapper {
            position: relative;
            width: 80vw;
            max-width: 360px;
            aspect-ratio: 1/1;
            margin: 10px auto 0;
            flex-shrink: 0;
        }
        #compassCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(30, 30, 80, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.3);
        }
        .angle-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            pointer-events: none;
            line-height: 1;
        }
        .angle-number {
            font-size: clamp(36px, 10vw, 56px);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.6), 0 0 60px rgba(0, 0, 0, 0.4);
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
        }
        .angle-number .deg-symbol { font-size: 0.5em; font-weight: 300; color: rgba(255, 255, 255, 0.5); margin-left: 2px; }
        .angle-direction {
            font-size: clamp(12px, 2.8vw, 16px);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            margin-top: 2px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        /* ===== 底部经纬度 ===== */
        .bottom-info {
            position: absolute;
            bottom: 24px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            padding: 10px 4px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .coord-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .coord-label { font-size: 10px; font-weight: 400; color: rgba(255, 255, 255, 0.25); text-transform: uppercase; letter-spacing: 1.5px; }
        .coord-value { font-size: 14px; font-weight: 500; color: rgba(255, 255, 255, 0.7); font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }
        .coord-value.loading { color: rgba(255, 255, 255, 0.2); font-weight: 300; font-size: 12px; }
        /* ===== 启动 / 错误遮罩 ===== */
        .sensor-prompt {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 18, 0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 50;
            padding: 40px;
            text-align: center;
            border-radius: 32px;
        }
        .sensor-prompt.show { display: flex; }
        .sensor-prompt .icon { font-size: 48px; margin-bottom: 18px; opacity: 0.8; }
        .sensor-prompt h3 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .sensor-prompt p { font-size: 14px; color: rgba(255, 255, 255, 0.5); max-width: 280px; line-height: 1.6; margin-bottom: 20px; }
        .sensor-prompt .btn-primary {
            padding: 12px 40px;
            border: none;
            border-radius: 30px;
            background: #3b82f6;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }
        .sensor-prompt .btn-primary:active { background: #2563eb; transform: scale(0.96); }
        .sensor-prompt .btn-secondary {
            padding: 10px 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }
        .sensor-prompt .btn-secondary:active { background: rgba(255, 255, 255, 0.05); }
        .sensor-prompt .error-detail { color: #f87171; font-size: 13px; margin-top: 12px; }
        /* ===== 响应式 ===== */
        @media (max-width: 400px) {
            .top-bar { top: 12px; left: 14px; right: 14px; }
            .level-indicator { padding: 4px 10px 4px 8px; }
            .level-text { font-size: 13px; }
            .bottom-info { bottom: 16px; left: 14px; right: 14px; }
            .coord-value { font-size: 12px; }
            .angle-number { font-size: clamp(28px, 8vw, 40px); }
        }
        @media (max-height: 640px) {
            .compass-wrapper { max-width: 260px; }
            .top-bar { top: 10px; }
            .bottom-info { bottom: 12px; }
        }
        #compassCanvas { will-change: transform; }
        .loading-shimmer { animation: shimmer 1.5s ease-in-out infinite; }
        @keyframes shimmer { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        ::-webkit-scrollbar { width: 0; height: 0; }
    </style>
</head>
<body>

<div class="app-container" id="app">

    <!-- ===== 顶部栏 ===== -->
    <div class="top-bar">
        <div class="level-indicator" id="levelIndicator">
            <div class="level-dot" id="levelDot"></div>
            <div class="level-text" id="levelText">0<span>°</span></div>
        </div>
        <div class="status-badge" id="statusBadge">● 待启动</div>
    </div>

    <!-- ===== 罗盘 ===== -->
    <div class="compass-wrapper" id="compassWrapper">
        <canvas id="compassCanvas"></canvas>
        <div class="angle-display">
            <div class="angle-number" id="angleNumber">--<span class="deg-symbol">°</span></div>
            <div class="angle-direction" id="angleDirection">-</div>
        </div>
    </div>

    <!-- ===== 底部经纬度 ===== -->
    <div class="bottom-info">
        <div class="coord-item">
            <div class="coord-label">纬度</div>
            <div class="coord-value" id="latValue">--°--'--"</div>
        </div>
        <div class="coord-item">
            <div class="coord-label">经度</div>
            <div class="coord-value" id="lngValue">--°--'--"</div>
        </div>
    </div>

    <!-- ===== 启动 / 错误遮罩 ===== -->
    <div class="sensor-prompt show" id="sensorPrompt">
        <div class="icon">🧭</div>
        <h3 id="promptTitle">启动指南针</h3>
        <p id="promptDesc">点击下方按钮，允许设备使用陀螺仪和磁力计</p>
        <button class="btn-primary" id="startBtn">启动指南针</button>
        <button class="btn-secondary" id="retryBtn" style="display:none;">重试</button>
        <div class="error-detail" id="errorDetail"></div>
    </div>

</div>

<script>
    // ============================================================
    //  DOM 引用
    // ============================================================
    const canvas = document.getElementById('compassCanvas');
    const ctx = canvas.getContext('2d');
    const angleNumber = document.getElementById('angleNumber');
    const angleDirection = document.getElementById('angleDirection');
    const levelText = document.getElementById('levelText');
    const levelDot = document.getElementById('levelDot');
    const statusBadge = document.getElementById('statusBadge');
    const latValue = document.getElementById('latValue');
    const lngValue = document.getElementById('lngValue');
    const sensorPrompt = document.getElementById('sensorPrompt');
    const startBtn = document.getElementById('startBtn');
    const retryBtn = document.getElementById('retryBtn');
    const promptTitle = document.getElementById('promptTitle');
    const promptDesc = document.getElementById('promptDesc');
    const errorDetail = document.getElementById('errorDetail');

    // ============================================================
    //  状态
    // ============================================================
    let currentAlpha = 0, currentBeta = 0, currentGamma = 0;
    let heading = 0;
    let hasOrientation = false;
    let hasLocation = false;
    let isSensorStarted = false;
    let startTimeout = null;
    const DIR_NAMES = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];

    // 尺寸
    let canvasSize = 0;
    let dpr = 1;

    // ============================================================
    //  Canvas 尺寸管理
    // ============================================================
    function resizeCanvas() {
        const wrapper = document.getElementById('compassWrapper');
        const rect = wrapper.getBoundingClientRect();
        const size = rect.width;
        dpr = window.devicePixelRatio || 1;
        canvasSize = size;
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        ctx.scale(dpr, dpr);
        drawCompass(0);
    }

    // ============================================================
    //  绘制罗盘 (与之前相同，略作精简)
    // ============================================================
    function drawCompass(rotation) {
        const size = canvasSize;
        if (size === 0) return;
        const cx = size / 2, cy = size / 2, radius = size / 2 - 6;
        ctx.clearRect(0, 0, size, size);

        // 外圈
        const grad = ctx.createRadialGradient(cx, cy, radius * 0.92, cx, cy, radius);
        grad.addColorStop(0, 'rgba(30, 30, 60, 0)');
        grad.addColorStop(0.85, 'rgba(30, 30, 60, 0.1)');
        grad.addColorStop(1, 'rgba(60, 60, 120, 0.15)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // 刻度
        for (let i = 0; i < 360; i++) {
            const angleRad = (i - 90) * Math.PI / 180;
            const isLong = i % 30 === 0, isMid = i % 5 === 0;
            let tickLen, lineWidth, color;
            if (isLong) { tickLen = radius * 0.14; lineWidth = 2.5; color = 'rgba(255,255,255,0.9)'; }
            else if (isMid) { tickLen = radius * 0.09; lineWidth = 1.8; color = 'rgba(255,255,255,0.5)'; }
            else { tickLen = radius * 0.05; lineWidth = 1; color = 'rgba(255,255,255,0.2)'; }
            const startR = radius - tickLen, endR = radius;
            const x1 = cx + startR * Math.cos(angleRad), y1 = cy + startR * Math.sin(angleRad);
            const x2 = cx + endR * Math.cos(angleRad), y2 = cy + endR * Math.sin(angleRad);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.stroke();
        }

        // 方向字母
        const dirs = [
            { label: 'N', angle: 0, color: '#ff3b3b' },
            { label: 'E', angle: 90, color: 'rgba(255,255,255,0.7)' },
            { label: 'S', angle: 180, color: 'rgba(255,255,255,0.7)' },
            { label: 'W', angle: 270, color: 'rgba(255,255,255,0.7)' },
        ];
        const fontSize = radius * 0.13;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        dirs.forEach(d => {
            const rad = (d.angle - 90) * Math.PI / 180;
            const r = radius * 0.78;
            const x = cx + r * Math.cos(rad), y = cy + r * Math.sin(rad);
            ctx.font = `600 ${fontSize}px -apple-system, "Helvetica Neue", sans-serif`;
            ctx.fillStyle = d.color;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;
            ctx.fillText(d.label, x, y + 1);
            ctx.shadowBlur = 0;
        });

        // 次要方向
        const subDirs = [{ label: 'NE', angle: 45 }, { label: 'SE', angle: 135 }, { label: 'SW', angle: 225 }, { label: 'NW', angle: 315 }];
        const subFontSize = radius * 0.075;
        ctx.font = `400 ${subFontSize}px -apple-system, "Helvetica Neue", sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        subDirs.forEach(d => {
            const rad = (d.angle - 90) * Math.PI / 180;
            const r = radius * 0.88;
            ctx.fillText(d.label, cx + r * Math.cos(rad), cy + r * Math.sin(rad) + 1);
        });

        // 内圈
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.65, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.42, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // 红色指针
        const pointerLen = radius * 0.35;
        const pointerBase = radius * 0.12;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(-rotation * Math.PI / 180);
        ctx.beginPath();
        ctx.moveTo(0, -pointerLen);
        ctx.lineTo(-pointerBase * 0.5, -pointerLen * 0.25);
        ctx.lineTo(-pointerBase * 0.3, pointerLen * 0.1);
        ctx.lineTo(0, pointerLen * 0.18);
        ctx.lineTo(pointerBase * 0.3, pointerLen * 0.1);
        ctx.lineTo(pointerBase * 0.5, -pointerLen * 0.25);
        ctx.closePath();
        const gradPtr = ctx.createLinearGradient(0, -pointerLen, 0, pointerLen * 0.18);
        gradPtr.addColorStop(0, '#ff1744');
        gradPtr.addColorStop(0.5, '#d50000');
        gradPtr.addColorStop(1, '#b71c1c');
        ctx.fillStyle = gradPtr;
        ctx.shadowColor = 'rgba(255, 23, 68, 0.4)';
        ctx.shadowBlur = 20;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.045, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.02, 0, Math.PI * 2);
        ctx.fillStyle = '#ff1744';
        ctx.shadowBlur = 0;
        ctx.fill();
        ctx.restore();

        // N 标记
        const nRad = (-90) * Math.PI / 180;
        const nR = radius - 2;
        ctx.beginPath();
        ctx.arc(cx + nR * Math.cos(nRad), cy + nR * Math.sin(nRad), 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 59, 59, 0.6)';
        ctx.shadowColor = 'rgba(255, 59, 59, 0.3)';
        ctx.shadowBlur = 15;
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // ============================================================
    //  更新显示
    // ============================================================
    function updateDisplay(alpha, beta, gamma) {
        heading = alpha;
        const rotation = (360 - alpha) % 360;
        drawCompass(rotation);

        const displayAngle = Math.round(alpha) % 360;
        angleNumber.innerHTML = `${displayAngle}<span class="deg-symbol">°</span>`;
        const dirIndex = Math.round(((alpha % 360) / 45)) % 8;
        angleDirection.textContent = DIR_NAMES[dirIndex] || '-';

        const tilt = Math.sqrt(beta * beta + gamma * gamma);
        const tiltDeg = tilt.toFixed(1);
        levelText.innerHTML = `${tiltDeg}<span>°</span>`;
        const dot = document.getElementById('levelDot');
        if (tilt < 3) { dot.className = 'level-dot'; dot.style.background = '#4ade80'; dot.style.boxShadow = '0 0 12px rgba(74,222,128,0.3)'; }
        else if (tilt < 8) { dot.className = 'level-dot warning'; dot.style.background = '#facc15'; dot.style.boxShadow = '0 0 12px rgba(250,204,21,0.3)'; }
        else { dot.className = 'level-dot danger'; dot.style.background = '#f87171'; dot.style.boxShadow = '0 0 12px rgba(248,113,113,0.3)'; }

        if (statusBadge.textContent.includes('待启动')) {
            statusBadge.textContent = '● 已校准';
            statusBadge.style.color = 'rgba(255,255,255,0.4)';
        }
    }

    // ============================================================
    //  传感器处理
    // ============================================================
    function handleOrientation(event) {
        let alpha = event.alpha || 0;
        let beta = event.beta || 0;
        let gamma = event.gamma || 0;
        if (typeof event.webkitCompassHeading === 'number') {
            alpha = event.webkitCompassHeading;
        }
        alpha = ((alpha % 360) + 360) % 360;
        beta = Math.max(-90, Math.min(90, beta));
        gamma = Math.max(-90, Math.min(90, gamma));
        currentAlpha = alpha;
        currentBeta = beta;
        currentGamma = gamma;

        if (!hasOrientation) {
            hasOrientation = true;
            sensorPrompt.classList.remove('show');
            statusBadge.textContent = '● 已校准';
            statusBadge.style.color = 'rgba(255,255,255,0.4)';
            clearTimeout(startTimeout);
        }
        updateDisplay(alpha, beta, gamma);
    }

    function onSensorError(e) {
        console.warn('Sensor error:', e);
        if (!hasOrientation) {
            clearTimeout(startTimeout);
            showError('传感器启动失败，请检查设备是否支持或重启浏览器');
        }
    }

    // ============================================================
    //  地理位置
    // ============================================================
    function getLocation() {
        if (!navigator.geolocation) {
            latValue.textContent = '不支持';
            lngValue.textContent = '不支持';
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                hasLocation = true;
                latValue.textContent = formatCoord(lat, 'lat');
                lngValue.textContent = formatCoord(lng, 'lng');
            },
            () => { latValue.textContent = '--°--\'--"'; lngValue.textContent = '--°--\'--"'; },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 30000 }
        );
    }

    function formatCoord(value, type) {
        const abs = Math.abs(value);
        const deg = Math.floor(abs);
        const min = Math.floor((abs - deg) * 60);
        const sec = ((abs - deg - min / 60) * 3600).toFixed(1);
        const dir = type === 'lat' ? (value >= 0 ? 'N' : 'S') : (value >= 0 ? 'E' : 'W');
        return `${deg}°${min}'${sec}"${dir}`;
    }

    // ============================================================
    //  启动指南针 (用户手势触发)
    // ============================================================
    function startCompass() {
        if (isSensorStarted) return;
        isSensorStarted = true;
        startBtn.disabled = true;
        startBtn.textContent = '启动中...';
        errorDetail.textContent = '';

        // 检查是否支持
        if (!window.DeviceOrientationEvent) {
            showError('您的设备不支持陀螺仪或磁力计');
            startBtn.disabled = false;
            startBtn.textContent = '启动指南针';
            return;
        }

        // iOS 13+ 需要请求权限
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(response => {
                    if (response === 'granted') {
                        initSensorListener();
                    } else {
                        showError('权限被拒绝，请在系统设置中允许');
                        startBtn.disabled = false;
                        startBtn.textContent = '启动指南针';
                    }
                })
                .catch(err => {
                    showError('权限请求失败: ' + err.message);
                    startBtn.disabled = false;
                    startBtn.textContent = '启动指南针';
                });
        } else {
            // Android 或其它，直接监听
            initSensorListener();
            // 设置超时，若5秒无数据则提示
            startTimeout = setTimeout(() => {
                if (!hasOrientation) {
                    showError('传感器无响应，请确认页面使用 HTTPS 且设备支持');
                    startBtn.disabled = false;
                    startBtn.textContent = '启动指南针';
                }
            }, 5000);
        }
    }

    function initSensorListener() {
        // 移除旧监听避免重复
        window.removeEventListener('deviceorientation', handleOrientation);
        window.removeEventListener('deviceorientationerror', onSensorError);
        window.addEventListener('deviceorientation', handleOrientation, true);
        window.addEventListener('deviceorientationerror', onSensorError, true);
        // 启动位置
        getLocation();
        // 隐藏遮罩（如果已获得数据，会在回调中隐藏）
        // 若已获得数据则隐藏，否则保持显示
        if (!hasOrientation) {
            // 但遮罩仍然显示，等待数据
        }
        // 更新提示
        promptTitle.textContent = '等待传感器数据...';
        promptDesc.textContent = '请将设备平放并缓慢旋转，等待校准';
        startBtn.style.display = 'none';
        retryBtn.style.display = 'inline-block';
        retryBtn.textContent = '重新尝试';
        retryBtn.onclick = () => {
            // 重置状态
            hasOrientation = false;
            isSensorStarted = false;
            window.removeEventListener('deviceorientation', handleOrientation);
            window.removeEventListener('deviceorientationerror', onSensorError);
            startBtn.disabled = false;
            startBtn.textContent = '启动指南针';
            startBtn.style.display = 'inline-block';
            retryBtn.style.display = 'none';
            promptTitle.textContent = '启动指南针';
            promptDesc.textContent = '点击下方按钮，允许设备使用陀螺仪和磁力计';
            errorDetail.textContent = '';
            sensorPrompt.classList.add('show');
        };
    }

    function showError(msg) {
        errorDetail.textContent = msg;
        promptTitle.textContent = '启动失败';
        promptDesc.textContent = '请尝试以下操作：';
        startBtn.textContent = '重试';
        startBtn.disabled = false;
        retryBtn.style.display = 'none';
        startBtn.style.display = 'inline-block';
        startBtn.onclick = () => {
            errorDetail.textContent = '';
            promptTitle.textContent = '启动指南针';
            promptDesc.textContent = '点击下方按钮，允许设备使用陀螺仪和磁力计';
            startBtn.textContent = '启动指南针';
            startBtn.onclick = startCompass;
            isSensorStarted = false;
            startCompass();
        };
    }

    // ============================================================
    //  窗口事件
    // ============================================================
    let resizeTimeout = null;

    function handleResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            resizeCanvas();
            if (hasOrientation) {
                drawCompass((360 - currentAlpha) % 360);
            } else {
                drawCompass(0);
            }
        }, 100);
    }

    // ============================================================
    //  初始化
    // ============================================================
    function init() {
        resizeCanvas();
        drawCompass(0);
        statusBadge.textContent = '● 待启动';

        // 显示启动遮罩
        sensorPrompt.classList.add('show');
        promptTitle.textContent = '启动指南针';
        promptDesc.textContent = '点击下方按钮，允许设备使用陀螺仪和磁力计';
        startBtn.textContent = '启动指南针';
        startBtn.style.display = 'inline-block';
        retryBtn.style.display = 'none';
        errorDetail.textContent = '';
        startBtn.onclick = startCompass;

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', () => setTimeout(handleResize, 300));

        // 动态创建 PWA manifest (简化)
        const manifest = {
            name: '指南针',
            short_name: '指南针',
            start_url: location.href,
            display: 'standalone',
            background_color: '#0a0a12',
            theme_color: '#0a0a12',
            icons: [
                { src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%230a0a12"/><path d="M50 10 L55 45 L90 50 L55 55 L50 90 L45 55 L10 50 L45 45 Z" fill="%23ff1744"/></svg>', sizes: '192x192', type: 'image/svg+xml' }
            ]
        };
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);
    }

    // 页面加载后启动
    if (document.readyState === 'complete') {
        init();
    } else {
        window.addEventListener('load', init);
    }

    // 页面可见性变化时刷新位置
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && hasOrientation) {
            getLocation();
        }
    });

    console.log('🧭 指南针 PWA 已加载 (点击启动)');
</script>
<script>
  // 可选 Service Worker (文件缺失不影响使用)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW 未注册'));
  }
</script>
</body>
</html>
