<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>指南针</title>
    <meta name="theme-color" content="#0a0a12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <style>
        /* ===== 全局重置（保持不变） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0a0a12;
            color: #fff;
            font-family: -apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            max-height: 860px;
            background: radial-gradient(ellipse at 50% 40%, #16162a, #0a0a12 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px 30px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }
        .top-bar {
            position: absolute;
            top: 18px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .level-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            padding: 6px 14px 6px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .level-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .level-dot.warning { background: #facc15; box-shadow: 0 0 12px rgba(250, 204, 21, 0.3); }
        .level-dot.danger { background: #f87171; box-shadow: 0 0 12px rgba(248, 113, 113, 0.3); }
        .level-dot.stable { background: #4ade80; box-shadow: 0 0 12px rgba(74, 222, 128, 0.5); }
        .level-text {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            font-variant-numeric: tabular-nums;
        }
        .level-text span { font-size: 12px; color: rgba(255, 255, 255, 0.4); margin-left: 2px; }
        .status-badge {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        .compass-wrapper {
            position: relative;
            width: 80vw;
            max-width: 360px;
            aspect-ratio: 1/1;
            margin: 10px auto 0;
            flex-shrink: 0;
        }
        #compassCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(30, 30, 80, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.3);
        }
        .angle-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            pointer-events: none;
            line-height: 1;
        }
        .angle-number {
            font-size: clamp(36px, 10vw, 56px);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
            letter-spacing: 1px;
        }
        .angle-number .deg-symbol { font-size: 0.5em; font-weight: 300; color: rgba(255, 255, 255, 0.5); margin-left: 2px; }
        .angle-direction {
            font-size: clamp(12px, 2.8vw, 16px);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            margin-top: 2px;
        }
        .bottom-info {
            position: absolute;
            bottom: 70px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            padding: 10px 4px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .coord-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .coord-label { font-size: 10px; font-weight: 400; color: rgba(255, 255, 255, 0.25); text-transform: uppercase; letter-spacing: 1.5px; }
        .coord-value { font-size: 13px; font-weight: 500; color: rgba(255, 255, 255, 0.7); font-variant-numeric: tabular-nums; }

        .calibration-toolbar {
            position: absolute;
            bottom: 16px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .calibration-toolbar button {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            letter-spacing: 0.5px;
        }
        .calibration-toolbar button:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.12); }
        .calibration-toolbar .btn-primary { background: #3b82f6; border-color: #3b82f6; }
        .calibration-toolbar .btn-primary:active { background: #2563eb; }
        .calibration-toolbar .btn-accent { background: #8b5cf6; border-color: #8b5cf6; }
        .calibration-toolbar .btn-accent:active { background: #7c3aed; }

        .sensor-prompt {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 18, 0.94);
            backdrop-filter: blur(12px);
            z-index: 50;
            padding: 40px;
            text-align: center;
            border-radius: 32px;
        }
        .sensor-prompt.show { display: flex; }
        .sensor-prompt .icon { font-size: 48px; margin-bottom: 18px; opacity: 0.8; }
        .sensor-prompt h3 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .sensor-prompt p { font-size: 14px; color: rgba(255, 255, 255, 0.5); max-width: 280px; line-height: 1.6; margin-bottom: 20px; }
        .sensor-prompt .btn-primary {
            padding: 12px 40px;
            border: none;
            border-radius: 30px;
            background: #3b82f6;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }
        .sensor-prompt .btn-primary:active { background: #2563eb; transform: scale(0.96); }
        .sensor-prompt .error-detail { color: #f87171; font-size: 13px; margin-top: 12px; }
        @media (max-width: 400px) {
            .top-bar { top: 12px; left: 14px; right: 14px; }
            .calibration-toolbar { bottom: 12px; left: 14px; right: 14px; }
            .calibration-toolbar button { font-size: 11px; padding: 8px 0; }
            .bottom-info { bottom: 60px; left: 14px; right: 14px; }
            .coord-value { font-size: 11px; }
        }
        @media (max-height: 640px) {
            .compass-wrapper { max-width: 260px; }
            .bottom-info { bottom: 60px; }
            .calibration-toolbar { bottom: 10px; }
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- 顶部栏 -->
    <div class="top-bar">
        <div class="level-indicator">
            <div class="level-dot stable" id="levelDot"></div>
            <div class="level-text" id="levelText">0<span>°</span></div>
        </div>
        <div class="status-badge" id="statusBadge">● 等待启动</div>
    </div>

    <!-- 罗盘 -->
    <div class="compass-wrapper">
        <canvas id="compassCanvas"></canvas>
        <div class="angle-display">
            <div class="angle-number" id="angleNumber">--<span class="deg-symbol">°</span></div>
            <div class="angle-direction" id="angleDirection">-</div>
        </div>
    </div>

    <!-- 经纬度 -->
    <div class="bottom-info">
        <div class="coord-item">
            <div class="coord-label">纬度</div>
            <div class="coord-value" id="latValue">--°--'--"</div>
        </div>
        <div class="coord-item">
            <div class="coord-label">经度</div>
            <div class="coord-value" id="lngValue">--°--'--"</div>
        </div>
    </div>

    <!-- 校准工具栏 -->
    <div class="calibration-toolbar">
        <button class="btn-accent" id="calibrateBtn">🧲 画8字校准</button>
        <button class="btn-primary" id="setNorthBtn">⬆ 设当前为北</button>
    </div>

    <!-- 启动遮罩 -->
    <div class="sensor-prompt show" id="sensorPrompt">
        <div class="icon">🧭</div>
        <h3 id="promptTitle">启动指南针</h3>
        <p id="promptDesc">点击下方按钮，允许设备使用陀螺仪和磁力计</p>
        <button class="btn-primary" id="startBtn">启动指南针</button>
        <div class="error-detail" id="errorDetail"></div>
    </div>
</div>

<script>
    // ============================================================
    //  DOM 引用
    // ============================================================
    const canvas = document.getElementById('compassCanvas');
    const ctx = canvas.getContext('2d');
    const angleNumber = document.getElementById('angleNumber');
    const angleDirection = document.getElementById('angleDirection');
    const levelText = document.getElementById('levelText');
    const levelDot = document.getElementById('levelDot');
    const statusBadge = document.getElementById('statusBadge');
    const latValue = document.getElementById('latValue');
    const lngValue = document.getElementById('lngValue');
    const sensorPrompt = document.getElementById('sensorPrompt');
    const startBtn = document.getElementById('startBtn');
    const promptTitle = document.getElementById('promptTitle');
    const promptDesc = document.getElementById('promptDesc');
    const errorDetail = document.getElementById('errorDetail');
    const calibrateBtn = document.getElementById('calibrateBtn');
    const setNorthBtn = document.getElementById('setNorthBtn');

    // ============================================================
    //  状态
    // ============================================================
    let currentAlpha = 0,
        currentBeta = 0,
        currentGamma = 0;
    let hasOrientation = false;
    let isSensorStarted = false;
    let canvasSize = 0,
        dpr = 1;

    // 用户偏移补偿
    let userOffset = 0;

    // 平滑滤波 (使用简单 EMA)
    let smoothedAlpha = null;
    const SMOOTH_FACTOR = 0.25;

    // 稳定性检测
    let alphaHistory = [];
    const HISTORY_SIZE = 12;

    const DIR_NAMES = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];

    // ============================================================
    //  Canvas 尺寸管理
    // ============================================================
    function resizeCanvas() {
        const wrapper = document.querySelector('.compass-wrapper');
        const rect = wrapper.getBoundingClientRect();
        const size = rect.width;
        dpr = window.devicePixelRatio || 1;
        canvasSize = size;
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        ctx.scale(dpr, dpr);
        drawCompass(0);
    }

    // ============================================================
    //  绘制罗盘 (核心绘图) —— 修复版
    // ============================================================
    function drawCompass(alpha) {
        const size = canvasSize;
        if (size === 0) return;
        const cx = size / 2,
            cy = size / 2,
            radius = size / 2 - 6;
        ctx.clearRect(0, 0, size, size);

        // ---------- 外圈光晕 (不旋转) ----------
        const grad = ctx.createRadialGradient(cx, cy, radius * 0.92, cx, cy, radius);
        grad.addColorStop(0, 'rgba(30, 30, 60, 0)');
        grad.addColorStop(0.85, 'rgba(30, 30, 60, 0.1)');
        grad.addColorStop(1, 'rgba(60, 60, 120, 0.15)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // ---------- 绘制刻度盘 (旋转使 N 指向地理北) ----------
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(-alpha * Math.PI / 180); // 逆时针旋转 alpha 度，使 N 指向北方

        // 刻度
        for (let i = 0; i < 360; i++) {
            const angleRad = (i - 90) * Math.PI / 180;
            const isLong = i % 30 === 0,
                isMid = i % 5 === 0;
            let tickLen, lineWidth, color;
            if (isLong) { tickLen = radius * 0.14;
                lineWidth = 2.5;
                color = 'rgba(255,255,255,0.9)'; } else if (isMid) { tickLen = radius * 0.09;
                lineWidth = 1.8;
                color = 'rgba(255,255,255,0.5)'; } else { tickLen = radius * 0.05;
                lineWidth = 1;
                color = 'rgba(255,255,255,0.2)'; }
            const startR = radius - tickLen,
                endR = radius;
            const x1 = startR * Math.cos(angleRad),
                y1 = startR * Math.sin(angleRad);
            const x2 = endR * Math.cos(angleRad),
                y2 = endR * Math.sin(angleRad);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.stroke();
        }

        // 主方向字母
        const dirs = [
            { label: 'N', angle: 0, color: '#ff3b3b' },
            { label: 'E', angle: 90, color: 'rgba(255,255,255,0.7)' },
            { label: 'S', angle: 180, color: 'rgba(255,255,255,0.7)' },
            { label: 'W', angle: 270, color: 'rgba(255,255,255,0.7)' },
        ];
        const fontSize = radius * 0.13;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        dirs.forEach(d => {
            const rad = (d.angle - 90) * Math.PI / 180;
            const r = radius * 0.78;
            const x = r * Math.cos(rad),
                y = r * Math.sin(rad);
            ctx.font = `600 ${fontSize}px -apple-system, "Helvetica Neue", sans-serif`;
            ctx.fillStyle = d.color;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;
            ctx.fillText(d.label, x, y + 1);
            ctx.shadowBlur = 0;
        });

        // 次要方向
        const subDirs = [{ label: 'NE', angle: 45 }, { label: 'SE', angle: 135 }, { label: 'SW', angle: 225 }, { label: 'NW',
                angle: 315 }];
        const subFontSize = radius * 0.075;
        ctx.font = `400 ${subFontSize}px -apple-system, "Helvetica Neue", sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        subDirs.forEach(d => {
            const rad = (d.angle - 90) * Math.PI / 180;
            const r = radius * 0.88;
            ctx.fillText(d.label, r * Math.cos(rad), r * Math.sin(rad) + 1);
        });

        // 内圈装饰
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.65, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.42, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.restore(); // 恢复坐标系

        // ---------- 绘制固定指针 (始终指向设备顶部，即画布上方) ----------
        const pointerLen = radius * 0.35;
        const pointerBase = radius * 0.12;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.beginPath();
        ctx.moveTo(0, -pointerLen);
        ctx.lineTo(-pointerBase * 0.5, -pointerLen * 0.25);
        ctx.lineTo(-pointerBase * 0.3, pointerLen * 0.1);
        ctx.lineTo(0, pointerLen * 0.18);
        ctx.lineTo(pointerBase * 0.3, pointerLen * 0.1);
        ctx.lineTo(pointerBase * 0.5, -pointerLen * 0.25);
        ctx.closePath();
        const gradPtr = ctx.createLinearGradient(0, -pointerLen, 0, pointerLen * 0.18);
        gradPtr.addColorStop(0, '#ff1744');
        gradPtr.addColorStop(0.5, '#d50000');
        gradPtr.addColorStop(1, '#b71c1c');
        ctx.fillStyle = gradPtr;
        ctx.shadowColor = 'rgba(255, 23, 68, 0.4)';
        ctx.shadowBlur = 20;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
        // 中心圆
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.045, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.02, 0, Math.PI * 2);
        ctx.fillStyle = '#ff1744';
        ctx.shadowBlur = 0;
        ctx.fill();
        ctx.restore();
    }

    // ============================================================
    //  更新显示 (含偏移、平滑、稳定性)
    // ============================================================
    function updateDisplay(rawAlpha, beta, gamma) {
        // 应用用户偏移
        let corrected = (rawAlpha + userOffset) % 360;
        if (corrected < 0) corrected += 360;

        // 平滑处理
        if (smoothedAlpha === null) {
            smoothedAlpha = corrected;
        } else {
            let diff = corrected - smoothedAlpha;
            if (diff > 180) diff -= 360;
            else if (diff < -180) diff += 360;
            smoothedAlpha += diff * SMOOTH_FACTOR;
            smoothedAlpha = ((smoothedAlpha % 360) + 360) % 360;
        }
        const displayAlpha = smoothedAlpha;

        // 绘制罗盘：传入 displayAlpha（方位角），内部会旋转刻度盘使 N 指北
        drawCompass(displayAlpha);

        // 数字显示
        const displayAngle = Math.round(displayAlpha) % 360;
        angleNumber.innerHTML = `${displayAngle}<span class="deg-symbol">°</span>`;
        const dirIndex = Math.round(((displayAlpha % 360) / 45)) % 8;
        angleDirection.textContent = DIR_NAMES[dirIndex] || '-';

        // 水平仪
        const tilt = Math.sqrt(beta * beta + gamma * gamma);
        levelText.innerHTML = `${tilt.toFixed(1)}<span>°</span>`;
        if (tilt < 3) {
            levelDot.className = 'level-dot stable';
        } else if (tilt < 10) {
            levelDot.className = 'level-dot warning';
        } else {
            levelDot.className = 'level-dot danger';
        }

        // 稳定性检测 (基于原始 alpha)
        alphaHistory.push(rawAlpha);
        if (alphaHistory.length > HISTORY_SIZE) alphaHistory.shift();
        if (alphaHistory.length > 5) {
            const avg = alphaHistory.reduce((a, b) => a + b, 0) / alphaHistory.length;
            const variance = alphaHistory.reduce((a, b) => a + (b - avg) * (b - avg), 0) / alphaHistory.length;
            const isStable = variance < 2.0;
            if (isStable) {
                statusBadge.textContent = '● 稳定';
                statusBadge.style.color = '#4ade80';
            } else {
                statusBadge.textContent = '● 移动中 (请画8字)';
                statusBadge.style.color = '#facc15';
            }
        } else {
            statusBadge.textContent = '● 初始化...';
        }
    }

    // ============================================================
    //  传感器事件处理
    // ============================================================
    function handleOrientation(event) {
        let alpha = event.alpha || 0;
        let beta = event.beta || 0;
        let gamma = event.gamma || 0;

        // iOS 使用 webkitCompassHeading
        if (typeof event.webkitCompassHeading === 'number') {
            alpha = event.webkitCompassHeading;
        }

        alpha = ((alpha % 360) + 360) % 360;
        beta = Math.max(-90, Math.min(90, beta));
        gamma = Math.max(-90, Math.min(90, gamma));

        currentAlpha = alpha;
        currentBeta = beta;
        currentGamma = gamma;

        if (!hasOrientation) {
            hasOrientation = true;
            sensorPrompt.classList.remove('show');
            statusBadge.textContent = '● 已连接';
            // 初始化平滑值
            smoothedAlpha = alpha;
        }

        updateDisplay(alpha, beta, gamma);

        // 调试日志 (可取消注释查看)
        // console.log('alpha:', alpha.toFixed(1), 'beta:', beta.toFixed(1), 'gamma:', gamma.toFixed(1));
    }

    function onSensorError(e) {
        console.warn('Sensor error:', e);
        if (!hasOrientation) {
            showError('传感器启动失败，请检查 HTTPS 或重启浏览器');
        }
    }

    // ============================================================
    //  地理位置
    // ============================================================
    function getLocation() {
        if (!navigator.geolocation) {
            latValue.textContent = '不支持';
            lngValue.textContent = '不支持';
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude,
                    lng = pos.coords.longitude;
                latValue.textContent = formatCoord(lat, 'lat');
                lngValue.textContent = formatCoord(lng, 'lng');
            },
            () => {
                latValue.textContent = '--°--\'--"';
                lngValue.textContent = '--°--\'--"';
            }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 30000 }
        );
    }

    function formatCoord(value, type) {
        const abs = Math.abs(value);
        const deg = Math.floor(abs);
        const min = Math.floor((abs - deg) * 60);
        const sec = ((abs - deg - min / 60) * 3600).toFixed(1);
        const dir = type === 'lat' ? (value >= 0 ? 'N' : 'S') : (value >= 0 ? 'E' : 'W');
        return `${deg}°${min}'${sec}"${dir}`;
    }

    // ============================================================
    //  校准功能
    // ============================================================
    function setCurrentAsNorth() {
        if (!hasOrientation) {
            alert('请等待指南针数据稳定后再操作');
            return;
        }
        const newOffset = (360 - currentAlpha) % 360;
        userOffset = newOffset;
        smoothedAlpha = 0; // 重置平滑值
        updateDisplay(currentAlpha, currentBeta, currentGamma);
        if (navigator.vibrate) navigator.vibrate(20);
        statusBadge.textContent = '● 已校准偏移: ' + Math.round(newOffset) + '°';
        setTimeout(() => {
            if (statusBadge.textContent.includes('校准偏移')) {
                statusBadge.textContent = '● 稳定';
                statusBadge.style.color = '#4ade80';
            }
        }, 1500);
    }

    function promptFigureEight() {
        if (!hasOrientation) {
            alert('请先启动指南针');
            return;
        }
        statusBadge.textContent = '🧲 请画 ∞ 字移动手机...';
        statusBadge.style.color = '#facc15';
        alphaHistory = [];
        setTimeout(() => {}, 4000);
        if (navigator.vibrate) navigator.vibrate(10);
    }

    // ============================================================
    //  启动逻辑
    // ============================================================
    function startCompass() {
        if (isSensorStarted) return;
        isSensorStarted = true;
        startBtn.disabled = true;
        startBtn.textContent = '启动中...';
        errorDetail.textContent = '';

        if (!window.DeviceOrientationEvent) {
            showError('设备不支持陀螺仪');
            return;
        }

        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(response => {
                    if (response === 'granted') {
                        initListener();
                    } else {
                        showError('权限被拒绝，请在设置中允许');
                        startBtn.disabled = false;
                        startBtn.textContent = '启动指南针';
                    }
                })
                .catch(err => {
                    showError('权限请求失败: ' + err.message);
                    startBtn.disabled = false;
                    startBtn.textContent = '启动指南针';
                });
        } else {
            initListener();
            setTimeout(() => {
                if (!hasOrientation) {
                    showError('传感器无响应，请确认页面使用 HTTPS');
                    startBtn.disabled = false;
                    startBtn.textContent = '启动指南针';
                }
            }, 5000);
        }
    }

    function initListener() {
        window.removeEventListener('deviceorientation', handleOrientation);
        window.addEventListener('deviceorientation', handleOrientation, true);
        window.addEventListener('deviceorientationerror', onSensorError, true);
        getLocation();
        promptTitle.textContent = '等待数据...';
        promptDesc.textContent = '请平放手机并缓慢旋转';
        startBtn.style.display = 'none';
    }

    function showError(msg) {
        errorDetail.textContent = msg;
        promptTitle.textContent = '启动失败';
        startBtn.textContent = '重试';
        startBtn.disabled = false;
        startBtn.style.display = 'inline-block';
        startBtn.onclick = () => {
            errorDetail.textContent = '';
            promptTitle.textContent = '启动指南针';
            promptDesc.textContent = '点击下方按钮，允许设备使用陀螺仪';
            startBtn.textContent = '启动指南针';
            startBtn.onclick = startCompass;
            isSensorStarted = false;
            startCompass();
        };
    }

    // ============================================================
    //  初始化
    // ============================================================
    function init() {
        resizeCanvas();
        drawCompass(0);
        sensorPrompt.classList.add('show');
        startBtn.onclick = startCompass;
        calibrateBtn.onclick = promptFigureEight;
        setNorthBtn.onclick = setCurrentAsNorth;

        window.addEventListener('resize', () => { resizeCanvas(); });
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) getLocation();
        });
    }

    if (document.readyState === 'complete') init();
    else window.addEventListener('load', init);
</script>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('Service Worker 注册成功，作用域:', reg.scope);
        }).catch(err => {
            console.error('Service Worker 注册失败:', err);
        });
    }
</script>
</body>
</html>
